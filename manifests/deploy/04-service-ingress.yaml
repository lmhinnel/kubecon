apiVersion: v1
kind: Service
metadata:
  name: harbor-webhook-signer
  namespace: harbor-webhook
  labels:
    app: harbor-webhook-signer
spec:
  type: ClusterIP
  selector:
    app: harbor-webhook-signer
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: harbor-webhook-signer
  namespace: harbor-webhook
  labels:
    app: harbor-webhook-signer
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "5"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "10"
spec:
  ingressClassName: nginx
  rules:
    - host: webhook.harbor.domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: harbor-webhook-signer
                port:
                  name: http
