apiVersion: v1
kind: Secret
metadata:
  name: kyverno-ingress-tls
  namespace: app-ns
data:
  tls.crt: >-
    
  tls.key: >-
    
type: kubernetes.io/tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kyverno-ingress
  namespace: app-ns
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # nginx.ingress.kubernetes.io/auth-type: basic
    # nginx.ingress.kubernetes.io/auth-secret: basic-auth-app-cluster
    # nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - kyverno.webhook.com
    secretName: kyverno-ingress-tls
  rules:
  - host: kyverno.webhook.com
    http:
      paths:
      - path: /app-ns/app-cluster(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: kyverno-svc
            port:
              number: 443
