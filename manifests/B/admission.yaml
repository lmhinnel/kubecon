apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: kyverno-resource-validating-webhook-cfg
  labels:
    webhook.kyverno.io/managed-by: kyverno
webhooks:
- name: validate.kyverno.svc-fail
  clientConfig:
    url: https://kyverno.webhook.com/app-ns/app-cluster/validate
    caBundle: >-
      
  rules:
  - operations:
    - CONNECT
    - CREATE
    - DELETE
    - UPDATE
    apiGroups:
    - ""
    apiVersions:
    - v1
    resources:
    - pods
    - pods/ephemeralcontainers
    - replicationcontrollers
    scope: Namespaced
  - operations:
    - CONNECT
    - CREATE
    - DELETE
    - UPDATE
    apiGroups:
    - apps
    apiVersions:
    - v1
    resources:
    - daemonsets
    - deployments
    - replicasets
    - statefulsets
    scope: Namespaced
  - operations:
    - CONNECT
    - CREATE
    - DELETE
    - UPDATE
    apiGroups:
    - batch
    apiVersions:
    - v1
    resources:
    - cronjobs
    - jobs
    scope: Namespaced
  failurePolicy: Fail
  matchPolicy: Equivalent
  namespaceSelector:
    matchExpressions:
    - key: kubernetes.io/metadata.name
      operator: NotIn
      values:
      - kube-system
    - key: kubernetes.io/metadata.name
      operator: NotIn
      values:
      - app-ns
  objectSelector: {}
  sideEffects: NoneOnDryRun
  timeoutSeconds: 30
  admissionReviewVersions:
  - v1
